name: Weekly Weather Screenshot

on:
  schedule:
    - cron: '0 6 * * 5'  # каждую пятницу в 6:00 UTC (9:00 МСК)
  workflow_dispatch:       # и возможность запустить вручную

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-noto-color-emoji \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2 \
            libpango-1.0-0 \
            libcairo2

      - name: Install dependencies
        run: |
          npm install puppeteer
          sudo apt-get install -y fonts-noto-color-emoji

      - name: Take screenshot
        run: node screenshot.js

      - name: Commit and push screenshot
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add weather.jpg
          git diff --staged --quiet || git commit -m "update weather screenshot"
          git push
